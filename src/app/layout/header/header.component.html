<header class="topbar">
  <div class="promo-banner">
    <span class="promo-copy">You're on Free. Upgrade and save $600</span>
    <button class="promo-link" type="button" (click)="onUpgradeClick()">Upgrade Now →</button>
  </div>

  <div class="toolbar">
    <div>
      <p class="eyebrow">AI workspace</p>
      <h2>Generative app launcher</h2>
    </div>

    <div class="topbar-actions">
      <div class="notification-wrapper">
        <button class="secondary-btn" type="button" (click)="toggleNotifications()">
          Updates <span class="notification-count">{{ notifications.length }}</span>
        </button>

        <div class="notification-dropdown" *ngIf="showNotifications">
          <div class="dropdown-header">
            <h4>Latest updates</h4>
            <button class="close-btn" type="button" (click)="closeNotifications()">×</button>
          </div>

          <div class="notification-list">
            <div class="notification-item" *ngFor="let note of notifications">
              <span class="notification-dot" [class]="'notification-dot ' + note.type"></span>
              <div class="notification-content">
                <p>{{ note.title }}</p>
                <span>{{ note.time }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="primary-btn" type="button" (click)="onUpgradeClick()">Open Pro tools</button>
    </div>
  </div>
</header>
