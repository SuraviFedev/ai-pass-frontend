<header class="topbar">
  <div class="topbar-copy">
    <span class="eyebrow">Enterprise AI Platform</span>
    <h2>AI Workspace</h2>
    <p>Monitor apps, run tasks, and review results from a unified control layer.</p>
  </div>

  <div class="topbar-actions">
    <div class="notification-wrapper">
      <button class="secondary-btn" type="button" (click)="toggleNotifications()">
        Notifications
        <span class="notification-count">{{ notifications.length }}</span>
      </button>

      <div class="notification-dropdown" *ngIf="showNotifications">
        <div class="dropdown-header">
          <h4>Notifications</h4>
          <button type="button" class="close-btn" (click)="closeNotifications()">×</button>
        </div>

        <div class="notification-list">
          <div class="notification-item" *ngFor="let note of notifications">
            <div
              class="notification-dot"
              [class.success]="note.type === 'success'"
              [class.info]="note.type === 'info'"
              [class.warning]="note.type === 'warning'"
            ></div>

            <div class="notification-content">
              <p>{{ note.title }}</p>
              <span>{{ note.time }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <button class="primary-btn" type="button" (click)="onUpgradeClick()">
      Upgrade Plan
    </button>
  </div>
</header>
