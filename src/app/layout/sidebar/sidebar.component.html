<aside class="sidebar">
  <div class="sidebar-top">
    <button class="icon-button brand-button" type="button" aria-label="AI Pass home">
      ✦
    </button>

    <button class="icon-button" type="button" aria-label="Open navigation">
      ☰
    </button>
  </div>

  <nav class="nav">
    <a
      *ngFor="let item of navItems"
      class="nav-link"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.route === '/' }"
    >
      <span class="nav-icon">{{ iconFor(item.label) }}</span>
      <span class="nav-label">{{ item.label }}</span>
    </a>
  </nav>

  <div class="sidebar-bottom">
    <button class="icon-button" type="button" aria-label="Open drive">⛁</button>
    <button class="icon-button" type="button" aria-label="More options">⋯</button>
  </div>
</aside>
